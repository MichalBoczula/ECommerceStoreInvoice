name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.100

      - name: Restore dependencies
        run: dotnet restore ECommerceStoreInvoice.slnx

      - name: Build
        run: dotnet build ECommerceStoreInvoice.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ECommerceStoreInvoice.slnx --configuration Release --no-build --verbosity normal